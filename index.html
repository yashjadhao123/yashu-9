<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yash Events Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: #0f172a;
      color: #fff;
      scroll-behavior: smooth;
    }

    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1505238680356-667803448bb6');
      background-size: cover;
      background-position: center;
    }

    header h1 {
      font-size: 3.5rem;
      letter-spacing: 2px;
    }

    header p {
      margin-top: 10px;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      padding: 10px;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover { color: #38bdf8; }

    section {
      padding: 80px 20px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
    }

    .services, .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: #334155;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .contact {
      text-align: center;
    }

    .contact input, .contact textarea {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
    }

    .contact button {
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      color: #000;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<nav>
  <a href="#home">Home</a>
  <a href="#services">Services</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<header id="home">
  <h1>Yash Events Management</h1>
  <p>Creating unforgettable experiences</p>
</header>

<section id="services">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Wedding Planning</div>
    <div class="card">Corporate Events</div>
    <div class="card">Birthday Parties</div>
    <div class="card">Concerts & Shows</div>
  </div>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1515168833906-d2a3b82b1f7b">
    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">
    <img src="https://images.unsplash.com/photo-1469371670807-013ccf25f16a">
  </div>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <div class="contact">
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea rows="5" placeholder="Your Message"></textarea><br>
    <button onclick="sendMessage()">Send</button>
  </div>
</section>

<footer>
  <p>© 2026 Yash Events Management</p>
</footer>

<script>
  function sendMessage() {
    alert("Thank you! Your message has been sent.");
  }
</script>

</body>
</html>
